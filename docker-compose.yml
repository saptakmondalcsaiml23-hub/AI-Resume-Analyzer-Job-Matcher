services:
  db:
    image: postgres:16-alpine
    container_name: resume_matcher_db
    environment:
      POSTGRES_DB: resume_matcher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d resume_matcher"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: resume_matcher_backend
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/resume_matcher
      CORS_ORIGINS: http://localhost:5173
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      MAX_UPLOAD_SIZE_MB: 5
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: resume_matcher_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
